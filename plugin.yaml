      path: /v1/chat/completions
      description: Chat Completions API
    - method: POST
      path: /v1/messages
      description: Anthropic Messages API（协议翻译）
    - method: GET
      path: /v1/models
      description: 模型列表
    - method: WS
      path: /v1/responses
      description: Responses API（WebSocket）
