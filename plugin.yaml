id: gateway-openai
name: OpenAI 网关
version: 1.0.0
description: OpenAI Responses API / Chat Completions 转发
author: airgate
type: gateway
min_core_version: 1.0.0
dependencies: []
config:
  - key: default_timeout
    type: duration
    default: 300s
    description: 默认请求超时
    required: false
gateway:
  platform: openai
  mode: simple
  routes:
    - method: POST
      path: /v1/responses
      description: Responses API（Codex 核心端点）
