id: gateway-openai
name: OpenAI 网关
version: 1.0.0
description: OpenAI Responses API / Chat Completions 转发（支持 Codex CLI）
author: airgate
type: gateway
min_core_version: "1.0.0"

dependencies: []

config:
  - key: default_timeout
    type: duration
    default: "300s"
    description: 默认请求超时

gateway:
  platform: openai
  mode: simple

  routes:
    - method: POST
      path: /v1/responses
      description: Responses API（Codex 核心端点）
    - method: POST
      path: /v1/chat/completions
      description: Chat Completions API
    - method: GET
      path: /v1/models
      description: 模型列表

  models:
    - id: codex-mini-latest
      name: Codex Mini
      max_tokens: 128000
      input_price: 1.5
      output_price: 6.0
    - id: gpt-4.1
      name: GPT-4.1
      max_tokens: 1047576
      input_price: 2.0
      output_price: 8.0
    - id: gpt-4.1-mini
      name: GPT-4.1 Mini
      max_tokens: 1047576
      input_price: 0.4
      output_price: 1.6
    - id: gpt-4.1-nano
      name: GPT-4.1 Nano
      max_tokens: 1047576
      input_price: 0.1
      output_price: 0.4
    - id: gpt-4o
      name: GPT-4o
      max_tokens: 128000
      input_price: 2.5
      output_price: 10.0
    - id: gpt-4o-mini
      name: GPT-4o Mini
      max_tokens: 128000
      input_price: 0.15
      output_price: 0.6
    - id: o3
      name: o3
      max_tokens: 200000
      input_price: 10.0
      output_price: 40.0
    - id: o3-pro
      name: o3 Pro
      max_tokens: 200000
      input_price: 20.0
      output_price: 80.0
    - id: o4-mini
      name: o4-mini
      max_tokens: 200000
      input_price: 1.1
      output_price: 4.4
    - id: o3-mini
      name: o3-mini
      max_tokens: 200000
      input_price: 1.1
      output_price: 4.4
    - id: gpt-image-1
      name: GPT Image 1
      max_tokens: 0
      input_price: 5.0
      output_price: 40.0

  account_types:
    - key: apikey
      label: API Key
      description: 使用 OpenAI API Key 直连
      fields:
        - key: api_key
          label: API Key
          type: password
          required: true
          placeholder: "sk-..."
        - key: base_url
          label: API 地址
          type: text
          required: false
          placeholder: "https://api.openai.com"
    - key: oauth
      label: OAuth 登录
      description: 使用 ChatGPT Access Token（WebSocket 模式）
      fields:
        - key: access_token
          label: Access Token
          type: password
          required: true
          placeholder: "eyJhbG..."
        - key: chatgpt_account_id
          label: ChatGPT Account ID
          type: text
          required: false
        - key: base_url
          label: API 地址
          type: text
          required: false
          placeholder: "https://api.openai.com"
