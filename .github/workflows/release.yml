name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Clone airgate-sdk (go.work replace)
        run: git clone --depth 1 https://github.com/DouDOU-start/airgate-sdk.git ../airgate-sdk

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build @airgate/theme
        run: cd ../airgate-sdk/frontend && npm ci && npm run build

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - name: Embed web dist
        run: |
          rm -rf backend/internal/gateway/webdist
          cp -r web/dist backend/internal/gateway/webdist

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build backend binary
        env:
          GOTOOLCHAIN: local
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          cd backend && go build -buildvcs=false -trimpath \
            -o ../bin/gateway-openai-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Generate SHA256
        run: |
          cd bin && sha256sum gateway-openai-${{ matrix.goos }}-${{ matrix.goarch }} \
            > gateway-openai-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gateway-openai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bin/gateway-openai-${{ matrix.goos }}-${{ matrix.goarch }}
            bin/gateway-openai-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/gateway-openai-*
